services:
  - type: web
    runtime: python
    name: atmu-unilibrary-api
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: AUTO_CREATE_TABLES
        value: "true"
      - key: AUTO_SEED
        value: "true"
      - key: CORS_ORIGINS
        value: "*"

  - type: web
    runtime: static
    name: atmu-unilibrary-web
    buildCommand: npm install && npm --prefix frontend install && node scripts/render-frontend-build.mjs
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: RENDER_API_HOST
        fromService:
          name: atmu-unilibrary-api
          type: web
          property: host
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /api/*
        destination: https://atmu-unilibrary-api.onrender.com/*
      - type: rewrite
        source: /*
        destination: /index.html
