[build]
  command = "npm install && node scripts/netlify-frontend-build.mjs"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "24.14.1"

[[redirects]]
  from = "/api/*"
  to = "https://atmu-unilibrary-api.onrender.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

